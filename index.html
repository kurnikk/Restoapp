<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resto App</title>
    <link rel="stylesheet" href="/styles/style.css">
</head>

<body>
    <header class="header">
        <div class="container">
            <div class="header__wrapper">
                <a class="header__logo-link" href="#">
                    <svg class="header__logo" width="137" height="22" aria-hidden="true">
                        <use xlink:href="images/sprite.svg#icon-header-logo"></use>
                    </svg>
                </a>
                <nav class="main-nav">
                    <ul class="main-nav__list">
                        <li class="main-nav__item">
                            <a class="main-nav__link" href="#">Меню</a>
                        </li>
                        <li class="main-nav__item">
                            <a class="main-nav__link" href="#">Акции</a>
                        </li>
                        <li class="main-nav__item">
                            <a class="main-nav__link" href="#">О нас</a>
                        </li>
                        <li class="main-nav__item">
                            <a class="main-nav__link" href="#">События</a>
                        </li>
                        <li class="main-nav__item">
                            <a class="main-nav__link" href="#">Зоны доставки</a>
                        </li>
                    </ul>
                </nav>
                <div class="header__contact-info">
                    <a class="header__tel" href="tel:+01234567890">+0 (123) 456 78-90</a>
                    <span class="header__accepting-orders">Прием заказов с 10:00 до 22:40</span>
                </div>
            </div>
        </div>
    </header>
    <main>
        <section class="menu">
            <div class="container">
                <div class="menu__wrapper">
                    <h1 class="menu__title">Меню</h1>
                    <div class="menu__inner">
                        <ul class="menu__list">
                            <li class="menu__item">
                                <a class="menu__link" href="#">
                                    <div class="menu__card">
                                        <img class="menu__card-image" src="images/menu-card-pizza.jpg" alt="Пицца"
                                            width="304" height="304">
                                        <h2 class="menu__card-title">Пицца</h2>
                                    </div>
                                </a>
                            </li>
                            <li class="menu__item">
                                <a class="menu__link" href="#">
                                    <div class="menu__card">
                                        <img class="menu__card-image" src="images/menu-card-soup.jpg" alt="Супы"
                                            width="304" height="304">
                                        <h2 class="menu__card-title">Супы</h2>
                                    </div>
                                </a>
                            </li>
                            <li class="menu__item">
                                <a class="menu__link" href="#">
                                    <div class="menu__card">
                                        <img class="menu__card-image" src="images/menu-card-hot-dishes.jpg"
                                            alt="Горячие блюда" width="304" height="304">
                                        <h2 class="menu__card-title">Горячие блюда</h2>
                                    </div>
                                </a>
                            </li>
                            <li class="menu__item">
                                <a class="menu__link" href="#">
                                    <div class="menu__card">
                                        <img class="menu__card-image" src="images/menu-card-salad.jpg" alt="Салаты"
                                            width="304" height="304">
                                        <h2 class="menu__card-title">Салаты</h2>
                                    </div>
                                </a>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </section>
    </main>

</body>

</html>
